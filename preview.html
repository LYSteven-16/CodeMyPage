<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeMyPage - 预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f7; overflow: auto; min-height: 100vh; }
    #app { position: relative; min-height: 100vh; padding: 40px; }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .header h1 { font-size: 15px; font-weight: 600; color: #1d1d1f; }
    .header button {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #007aff;
      background: rgba(0, 122, 255, 0.08);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .header button:hover { background: rgba(0, 122, 255, 0.12); }
    .content { margin-top: 48px; display: flex; justify-content: center; }
    .canvas {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      position: relative;
      width: 1000px;
      min-height: 1200px;
    }
    .empty {
      padding: 80px 40px;
      text-align: center;
      color: #86868b;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/preview.ts"></script>
</body>
</html>
