name: Deploy to GitHub Pages

on:
  push:
    branches: [V2.0]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clone and build atom-engine
        run: |
          git clone --depth 1 https://github.com/LYSteven-16/atom-engine.git /tmp/atom-engine
          cd /tmp/atom-engine
          npm install
          npm run build
          mkdir -p ${{ github.workspace }}/node_modules/@component-chemistry/atom-engine/dist/
          cp -r dist/* ${{ github.workspace }}/node_modules/@component-chemistry/atom-engine/dist/

      - name: Build all (main app + export bundle)
        run: npm run build:all

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
