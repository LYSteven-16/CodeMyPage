name: Initialize GitHub Pages

on:
  push:
    branches: [V2.0]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages
        run: |
          echo "GitHub Pages will be enabled by the deploy-pages action"
          echo "No manual setup required when using GitHub Actions as source"
