name: Setup GitHub Pages Environment

on:
  push:
    branches:
      - V2.0
  workflow_dispatch:

jobs:
  setup-environment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Create GitHub Pages environment
        run: |
          curl -L -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/environments/github-pages \
            -d '{
              "payload": {
                "description": "GitHub Pages deployment environment",
                "deployment_branch_policy": {
                  "protected_branches": false,
                  "custom_branches": true
                }
              }
            }'
